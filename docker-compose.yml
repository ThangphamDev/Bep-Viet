version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: bepviet_mysql
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: bepviet
      MYSQL_USER: bepviet
      MYSQL_PASSWORD: bepviet123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./bepviet_full_schema.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password

  adminer:
    image: adminer:latest
    container_name: bepviet_adminer
    ports:
      - "8081:8080"
    depends_on:
      - mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bepviet_backend
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: development
      PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: bepviet
      DB_PASS: bepviet123
      DB_NAME: bepviet
      JWT_SECRET: supersecretkey123456789012345678901234567890
      JWT_EXPIRES: 3600
      REFRESH_SECRET: refreshsecretkey123456789012345678901234567890
      REFRESH_EXPIRES: 604800
    depends_on:
      - mysql
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

  ngrok:
    image: ngrok/ngrok:latest
    container_name: bepviet_ngrok
    environment:
      NGROK_AUTHTOKEN: "34EeI1bvlne62Ni1ElFtXQ9rx93_4gCgGDYfp7r5gQwtkA16U"
    command: 
      - "tunnel"
      - "http://backend:8080"
    depends_on:
      - backend
    ports:
      - "4040:4040"

volumes:
  mysql_data:
